<style>

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2px; }
  .card { background: #111; padding: 32px; text-decoration: none; color: #fff; display: block; transition: background 0.15s; border-left: 4px solid #6c63ff; }
  .card:hover { background: #1a1a1a; }
  .card-date { font-family: 'Fraunces', serif; font-size: 48px; font-weight: 900; line-height: 1; color: #6c63ff; }
  .card-label { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: #555; margin-top: 8px; }
  .card-new { display: inline-block; background: #e63946; color: #fff; font-size: 10px; font-weight: 800; letter-spacing: 2px; padding: 4px 10px; margin-top: 12px; text-transform: uppercase; }
  @media (max-width: 600px) { body { padding: 40px 24px; } }
</style>
