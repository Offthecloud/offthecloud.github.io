<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good Morning Magazine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#070810;color:white;font-family:'Inter',sans-serif;min-height:100vh;}
header{text-align:center;padding:80px 20px 50px;border-bottom:1px solid rgba(255,255,255,0.08);}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:#6c63ff;margin-bottom:16px;}
h1{font-family:'Fraunces',serif;font-weight:900;font-size:clamp(48px,10vw,120px);line-height:1;}
.subtitle{color:rgba(255,255,255,0.45);font-size:15px;margin-top:16px;letter-spacing:2px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1px;background:rgba(255,255,255,0.08);padding:1px;margin:40px;}
.card{background:#0d0c1a;padding:36px 32px;text-decoration:none;color:white;transition:background 0.2s;display:flex;flex-direction:column;gap:12px;}
.card:hover{background:#161428;}
.card-date{font-size:12px;font-weight:600;color:#6c63ff;letter-spacing:2px;text-transform:uppercase;}
.card-title{font-family:'Fraunces',serif;font-size:32px;font-weight:900;}
.card-arrow{font-size:24px;color:rgba(255,255,255,0.3);margin-top:auto;}
footer{text-align:center;padding:40px;font-size:11px;color:rgba(255,255,255,0.2);letter-spacing:2px;text-transform:uppercase;}
@media(max-width:600px){.grid{margin:20px 16px;}}
</style>
</head>
<body>
<header>
  <div class="eyebrow">T&#228;glich kuratiert f&#252;r Timo Off</div>
  <h1>Good Morning</h1>
  <div class="subtitle">Alle Ausgaben</div>
</header>
